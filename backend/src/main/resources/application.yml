# ─────────────────────────────────────────────────────────────
# application.yml — configurações comuns a todos os profiles
# Segredos NUNCA aqui — sempre via variáveis de ambiente (.env)
# ─────────────────────────────────────────────────────────────
spring:
  application:
    name: oauth2-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gerencia o schema; JPA só valida
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ── JWT interno ───────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}          # 15 min
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 dias

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

  # ── OAuth2: apenas Google e Facebook ─────────────────────────
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      # 🔥 CORRIGIDO: agora aponta para o Angular
      redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:4200/auth/callback}
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

    facebook:
      client-id: ${FACEBOOK_CLIENT_ID}
      client-secret: ${FACEBOOK_CLIENT_SECRET}
      # 🔥 CORRIGIDO: agora aponta para o Angular
      redirect-uri: ${OAUTH_REDIRECT_URI:http://localhost:4200/auth/callback}
      token-uri: https://graph.facebook.com/v18.0/oauth/access_token
      user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture.type(large)

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: WARN
    com.example.api: INFO