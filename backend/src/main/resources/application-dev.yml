spring:
  datasource:
    url: jdbc:mysql://localhost:3306/oauth2_app_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 5

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-minimo-32-caracteres-ok}

logging:
  level:
    root: INFO
    com.example.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
